<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сделки - LMD-T-bot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Список сделок</h1>
            <nav class="tabs">
                <a href="/" class="tab active">Сделки</a>
                <a href="/stats.html" class="tab">Статистика по дням</a>
            </nav>
            <div id="status">Загрузка данных...</div>
        </header>
        
        <main>
            <div id="trades-container">
                <!-- Daily trades will be inserted here as collapsible blocks -->
            </div>
            
            <div class="summary-card">
                <h3>Итог за все время</h3>
                <div class="summary-values">
                    <div>
                        <span class="summary-label">Всего сделок:</span>
                        <span id="total-trades" class="summary-value">0</span>
                    </div>
                    <div>
                        <span class="summary-label">Сумма комиссий:</span>
                        <span id="total-commissions" class="summary-value">0</span>
                    </div>
                </div>
            </div>
            
            <div id="no-data" class="hidden">Нет данных о сделках в базе</div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
